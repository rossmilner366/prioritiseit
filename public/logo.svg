<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2BA8D4"/>
      <stop offset="100%" stop-color="#1E7DA0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Three priority bars (tall→short = ranked) with rounded ends -->
  <rect x="120" y="148" width="56" height="248" rx="28" fill="white" opacity="0.95"/>
  <rect x="228" y="208" width="56" height="188" rx="28" fill="white" opacity="0.65"/>
  <rect x="336" y="268" width="56" height="128" rx="28" fill="white" opacity="0.35"/>
  
  <!-- Upward arrow accent on top of the tallest bar -->
  <path d="M148 128 L148 100 L128 120 M148 100 L168 120" 
        stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
</svg>
